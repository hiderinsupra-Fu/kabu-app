<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>株価分析アプリ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    /* Header */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .subtitle { color: #8b949e; font-size: 12px; }

    /* Layout */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    /* Search section */
    .search-section { padding: 20px 0 12px; }
    .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    .search-input {
      flex: 1;
      min-width: 280px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 16px;
      color: #e6edf3;
      font-size: 15px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus {
      outline: none;
      border-color: #1f6feb;
      box-shadow: 0 0 0 3px rgba(31,111,235,0.2);
    }
    .search-input::placeholder { color: #484f58; }
    .btn-primary {
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #388bfd; }

    /* Quick symbols */
    .quick-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .quick-label { color: #8b949e; font-size: 12px; }
    .quick-btn {
      padding: 4px 11px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 5px;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .quick-btn:hover { background: #30363d; color: #e6edf3; }

    /* Period buttons */
    .period-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .period-label { color: #8b949e; font-size: 12px; }
    .period-btn {
      padding: 5px 14px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .period-btn:hover { background: #30363d; color: #e6edf3; }
    .period-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }

    /* Error */
    .error-box {
      background: rgba(248,81,73,0.1);
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 14px 18px;
      color: #f85149;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    /* Loading */
    .loading-box { text-align: center; padding: 60px 0; display: none; }
    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 3px solid #30363d;
      border-top-color: #1f6feb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #8b949e; font-size: 14px; margin-top: 14px; }

    /* Main content */
    .main-content { display: none; padding-bottom: 40px; }

    /* Stock header */
    .stock-header {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 20px;
    }
    .stock-name { font-size: 22px; font-weight: 700; }
    .stock-symbol { color: #8b949e; font-size: 13px; margin-top: 3px; }
    .price-block { display: flex; align-items: flex-end; gap: 14px; }
    .current-price { font-size: 38px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .price-change { font-size: 18px; font-weight: 600; padding-bottom: 2px; }
    .up { color: #3fb950; }
    .down { color: #f85149; }
    .neutral-color { color: #8b949e; }
    .last-updated { color: #8b949e; font-size: 12px; padding-bottom: 4px; margin-left: auto; }

    /* Metrics grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .metric-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      transition: transform 0.12s;
    }
    .metric-card:hover { transform: translateY(-2px); }
    .metric-label { color: #8b949e; font-size: 11px; margin-bottom: 5px; }
    .metric-value { font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }

    /* Card */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 14px;
    }

    /* Charts grid */
    .charts-top {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 14px;
      margin-bottom: 14px;
    }
    .charts-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .chart-wrap { position: relative; }

    /* Chart legend */
    .chart-legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8b949e; }
    .legend-line { width: 20px; height: 2px; display: inline-block; border-radius: 1px; }

    /* Analysis panel */
    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 13px;
    }
    .signal-row:last-child { border-bottom: none; }
    .signal-name { color: #8b949e; }
    .badge {
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-buy { background: #1a3a1f; color: #3fb950; }
    .badge-sell { background: #3a1a1a; color: #f85149; }
    .badge-neutral { background: #21262d; color: #8b949e; }

    .overall-signal {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      padding: 10px;
      border-radius: 8px;
      margin-top: 14px;
    }
    .overall-buy { background: #1a3a1f; color: #3fb950; }
    .overall-sell { background: #3a1a1a; color: #f85149; }
    .overall-neutral { background: #21262d; color: #8b949e; }

    /* Responsive */
    @media (max-width: 900px) {
      .charts-top { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .charts-bottom { grid-template-columns: 1fr; }
      .current-price { font-size: 28px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📈 株価分析アプリ</h1>
  <span class="subtitle">Yahoo Finance データ使用</span>
</header>

<div class="container">

  <!-- Search -->
  <div class="search-section">
    <div class="search-row">
      <input
        id="symbolInput"
        class="search-input"
        type="text"
        placeholder="銘柄コードを入力 (例: AAPL, 7203.T, ^N225, BTC-USD)"
        value="AAPL"
        onkeydown="if(event.key==='Enter')searchStock()"
      />
      <button class="btn-primary" onclick="searchStock()">分析する</button>
    </div>
    <div class="quick-row">
      <span class="quick-label">人気銘柄:</span>
      <button class="quick-btn" onclick="quickSearch('AAPL')">Apple</button>
      <button class="quick-btn" onclick="quickSearch('MSFT')">Microsoft</button>
      <button class="quick-btn" onclick="quickSearch('NVDA')">NVIDIA</button>
      <button class="quick-btn" onclick="quickSearch('TSLA')">Tesla</button>
      <button class="quick-btn" onclick="quickSearch('AMZN')">Amazon</button>
      <button class="quick-btn" onclick="quickSearch('GOOGL')">Google</button>
      <button class="quick-btn" onclick="quickSearch('7203.T')">トヨタ</button>
      <button class="quick-btn" onclick="quickSearch('7974.T')">任天堂</button>
      <button class="quick-btn" onclick="quickSearch('9984.T')">ソフトバンクG</button>
      <button class="quick-btn" onclick="quickSearch('6758.T')">ソニー</button>
      <button class="quick-btn" onclick="quickSearch('^N225')">日経225</button>

    <div class="period-row">

      <button class="period-btn active" data-range="1y" onclick="changePeriod(this,'1y')">1年</button>
      <button class="period-btn" data-range="2y" onclick="changePeriod(this,'2y')">2年</button>
      <button class="period-btn" data-range="5y" onclick="changePeriod(this,'5y')">5年</button>
    </div>
  </div>

  <!-- Error -->
  <div id="errorBox" class="error-box"></div>

  <!-- Loading -->
  <div id="loadingBox" class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">データ取得中...</div>
  </div>

  <!-- Main content -->
  <div id="mainContent" class="main-content">

    <!-- Stock header -->
    <div class="stock-header">
      <div>
        <div id="stockName" class="stock-name"></div>
        <div id="stockSymbolInfo" class="stock-symbol"></div>
      </div>

        <div id="priceChange" class="price-change"></div>
      </div>
      <div id="lastUpdated" class="last-updated"></div>
    </div>

    <!-- Metrics -->
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">前日終値</div><div id="m-prev" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">始値</div><div id="m-open" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">高値</div><div id="m-high" class="metric-value up">-</div></div>
      <div class="metric-card"><div class="metric-label">安値</div><div id="m-low" class="metric-value down">-</div></div>
      <div class="metric-card"><div class="metric-label">52週高値</div><div id="m-52h" class="metric-value up">-</div></div>
      <div class="metric-card"><div class="metric-label">52週安値</div><div id="m-52l" class="metric-value down">-</div></div>
      <div class="metric-card"><div class="metric-label">出来高</div><div id="m-vol" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">時価総額</div><div id="m-cap" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">PER</div><div id="m-per" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">配当利回り</div><div id="m-div" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">RSI(14)</div><div id="m-rsi" class="metric-value">-</div></div>
      <div class="metric-card"><div class="metric-label">通貨</div><div id="m-cur" class="metric-value">-</div></div>
    </div>

    <!-- Price chart + Analysis -->
    <div class="charts-top">
      <div class="card">
        <div class="card-title">株価チャート</div>
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-line" style="background:#58a6ff;"></span>終値</span>
          <span class="legend-item"><span class="legend-line" style="background:#d29922;"></span>MA25</span>
          <span class="legend-item"><span class="legend-line" style="background:#f0883e;"></span>MA75</span>
          <span class="legend-item"><span class="legend-line" style="background:#bc8cff;border-top:2px dashed #bc8cff;height:0;"></span>MA200</span>
        </div>
        <div class="chart-wrap" style="height:280px;">
          <canvas id="priceChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📊 テクニカル分析</div>
        <div id="analysisContent"></div>
        <div id="overallSignal" class="overall-signal"></div>

    <!-- Volume + RSI -->
    <div class="charts-bottom">
      <div class="card">
        <div class="card-title">出来高</div>

          <canvas id="volumeChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">RSI (14) — 70以上:買われすぎ / 30以下:売られすぎ</div>
        <div class="chart-wrap" style="height:160px;">
          <canvas id="rsiChart"></canvas>
        </div>
      </div>
    </div>

    <!-- MACD -->
    <div class="card">
      <div class="card-title">MACD (12, 26, 9)</div>
      <div class="chart-legend">
        <span class="legend-item"><span class="legend-line" style="background:#58a6ff;"></span>MACD</span>
        <span class="legend-item"><span class="legend-line" style="background:#f0883e;"></span>シグナル</span>
        <span class="legend-item"><span style="width:10px;height:10px;background:#3fb950;opacity:.6;display:inline-block;border-radius:2px;"></span>ヒストグラム(+)</span>
        <span class="legend-item"><span style="width:10px;height:10px;background:#f85149;opacity:.6;display:inline-block;border-radius:2px;"></span>ヒストグラム(-)</span>
      </div>
      <div class="chart-wrap" style="height:160px;">
        <canvas id="macdChart"></canvas>
      </div>
    </div>

  </div><!-- /main-content -->
</div><!-- /container -->

<script>
'use strict';

// ============================================================
// State
// ============================================================
let currentSymbol = 'AAPL';
let currentRange = '1y';
const charts = {};

// ============================================================
// Technical Indicators
// ============================================================
function calcSMA(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    let sum = 0, count = 0;
    for (let j = i - period + 1; j <= i; j++) {
      if (data[j] !== null && !isNaN(data[j])) { sum += data[j]; count++; }
    }
    return count === period ? sum / period : null;
  });
}

function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const result = [];
  let ema = null;
  for (let i = 0; i < data.length; i++) {
    const v = data[i];
    if (v === null || isNaN(v)) { result.push(null); continue; }
    if (ema === null) {
      if (i >= period - 1) {
        let sum = 0, valid = true;
        for (let j = i - period + 1; j <= i; j++) {
          if (data[j] === null || isNaN(data[j])) { valid = false; break; }
          sum += data[j];
        }
        if (valid) ema = sum / period;
      }
      result.push(ema);
    } else {
      ema = v * k + ema * (1 - k);
      result.push(ema);
    }
  }
  return result;
}

function calcRSI(closes, period = 14) {
  const result = new Array(period).fill(null);
  if (closes.length <= period) return result;

  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff > 0) avgGain += diff; else avgLoss += Math.abs(diff);
  }
  avgGain /= period;
  avgLoss /= period;

  result.push(avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss));

  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    const gain = diff > 0 ? diff : 0;
    const loss = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    result.push(avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss));
  }
  return result;
}

function calcMACD(closes, fast = 12, slow = 26, signal = 9) {
  const emaFast = calcEMA(closes, fast);
  const emaSlow = calcEMA(closes, slow);
  const macdLine = emaFast.map((v, i) =>
    v !== null && emaSlow[i] !== null ? v - emaSlow[i] : null
  );
  const signalLine = calcEMA(macdLine, signal);
  const histogram = macdLine.map((v, i) =>
    v !== null && signalLine[i] !== null ? v - signalLine[i] : null
  );
  return { macdLine, signalLine, histogram };
}

// ============================================================
// API
// ============================================================
async function fetchYahoo(symbol, range) {
  const interval = (range === '5y' || range === '2y') ? '1wk' : '1d';
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${interval}&range=${range}&includePrePost=false`;

  // Try direct
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (r.ok) return await r.json();
  } catch (_) {}

  // CORS proxy fallback
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  const r2 = await fetch(proxy);
  if (!r2.ok) throw new Error(`HTTP ${r2.status}: データ取得に失敗しました`);
  return await r2.json();
}

async function fetchQuoteSummary(symbol) {
  const url = `https://query2.finance.yahoo.com/v10/finance/quoteSummary/${encodeURIComponent(symbol)}?modules=price,summaryDetail`;
  for (const src of [url, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`]) {
    try {
      const r = await fetch(src);
      if (r.ok) return await r.json();
    } catch (_) {}
  }
  return null;
}

// ============================================================
// Formatting
// ============================================================
function fmtPrice(n, currency) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  const sym = currency === 'JPY' ? '¥' : currency === 'USD' ? '$' : '';
  const dec = currency === 'JPY' ? 0 : 2;
  return sym + Number(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function fmtNum(n, dec = 2) {
  if (n === null || n === undefined || isNaN(n)) return '-';
  return Number(n).toFixed(dec);
}

function fmtLarge(n, currency) {
  if (!n || isNaN(n)) return '-';
  if (currency === 'JPY') {
    if (n >= 1e12) return (n / 1e12).toFixed(2) + '兆円';
    if (n >= 1e8)  return (n / 1e8).toFixed(2) + '億円';
    return n.toLocaleString() + '円';
  }
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString();
}

function fmtVol(n) {
  if (!n || isNaN(n)) return '-';
  if (n >= 1e8)  return (n / 1e8).toFixed(1) + '億';
  if (n >= 1e4)  return (n / 1e4).toFixed(1) + '万';
  if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

function setEl(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val === null || val === undefined || val === '' ? '-' : val;
}

// ============================================================
// Chart defaults
// ============================================================
const SCALE_X = {
  type: 'time',
  grid: { color: '#21262d' },
  ticks: { color: '#8b949e', maxTicksLimit: 8 },
};
const SCALE_Y_R = {
  position: 'right',
  grid: { color: '#21262d' },
  ticks: { color: '#8b949e' },
};

function destroyCharts() {
  Object.keys(charts).forEach(k => { if (charts[k]) { charts[k].destroy(); delete charts[k]; } });
}

function toPoints(dates, data) {
  return dates.map((d, i) => ({ x: d, y: data[i] })).filter(p => p.y !== null && !isNaN(p.y));
}

// ============================================================
// Draw charts
// ============================================================
function drawPriceChart(dates, closes, ma25, ma75, ma200, currency) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  const closePts = toPoints(dates, closes);

  const gradFill = ctx.createLinearGradient(0, 0, 0, 280);
  gradFill.addColorStop(0, 'rgba(88,166,255,0.12)');
  gradFill.addColorStop(1, 'rgba(88,166,255,0)');

  charts.price = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: '終値',
          data: closePts,
          borderColor: '#58a6ff',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.1,
          fill: true,
          backgroundColor: gradFill,
        },
        {
          label: 'MA25',
          data: toPoints(dates, ma25),
          borderColor: '#d29922',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
        {
          label: 'MA75',
          data: toPoints(dates, ma75),
          borderColor: '#f0883e',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
        {
          label: 'MA200',
          data: toPoints(dates, ma200),
          borderColor: '#bc8cff',
          borderWidth: 1.5,
          borderDash: [5, 3],
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${fmtPrice(ctx.parsed.y, currency)}`,
          },
        },
      },
      scales: {
        x: SCALE_X,
        y: { ...SCALE_Y_R, ticks: { color: '#8b949e', callback: v => fmtPrice(v, currency) } },
      },
    },
  });
}

function drawVolumeChart(dates, volumes, closes, prevClose) {
  const ctx = document.getElementById('volumeChart').getContext('2d');
  const data = [], colors = [];
  dates.forEach((d, i) => {
    if (volumes[i] !== null && !isNaN(volumes[i])) {
      data.push({ x: d, y: volumes[i] });
      const prev = i === 0 ? prevClose : closes[i - 1];
      colors.push(closes[i] >= prev ? 'rgba(63,185,80,0.55)' : 'rgba(248,81,73,0.55)');
    }
  });

  charts.volume = new Chart(ctx, {
    type: 'bar',
    data: { datasets: [{ label: '出来高', data, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: { legend: { display: false } },
      scales: {
        x: SCALE_X,
        y: { ...SCALE_Y_R, ticks: { color: '#8b949e', callback: v => fmtVol(v) } },
      },
    },
  });
}

function drawRSIChart(dates, rsi) {
  const ctx = document.getElementById('rsiChart').getContext('2d');
  const rsiPts = toPoints(dates, rsi);
  // Reference lines as flat datasets
  const refData70 = rsiPts.length ? [{ x: rsiPts[0].x, y: 70 }, { x: rsiPts[rsiPts.length - 1].x, y: 70 }] : [];
  const refData30 = rsiPts.length ? [{ x: rsiPts[0].x, y: 30 }, { x: rsiPts[rsiPts.length - 1].x, y: 30 }] : [];

  charts.rsi = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        { label: 'RSI(14)', data: rsiPts, borderColor: '#e3b341', borderWidth: 1.5, pointRadius: 0, tension: 0.1, fill: false },
        { label: '70', data: refData70, borderColor: 'rgba(248,81,73,0.4)', borderWidth: 1, borderDash: [4, 3], pointRadius: 0, fill: false },
        { label: '30', data: refData30, borderColor: 'rgba(63,185,80,0.4)', borderWidth: 1, borderDash: [4, 3], pointRadius: 0, fill: false },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: SCALE_X,
        y: { ...SCALE_Y_R, min: 0, max: 100, ticks: { color: '#8b949e' } },
      },
    },
  });
}

function drawMACDChart(dates, macdLine, signalLine, histogram) {
  const ctx = document.getElementById('macdChart').getContext('2d');

  const histData = [], histColors = [];
  dates.forEach((d, i) => {
    if (histogram[i] !== null && !isNaN(histogram[i])) {
      histData.push({ x: d, y: histogram[i] });
      histColors.push(histogram[i] >= 0 ? 'rgba(63,185,80,0.55)' : 'rgba(248,81,73,0.55)');
    }
  });

  charts.macd = new Chart(ctx, {
    type: 'bar',
    data: {
      datasets: [
        { type: 'bar',  label: 'ヒストグラム', data: histData, backgroundColor: histColors, borderWidth: 0 },
        { type: 'line', label: 'MACD',         data: toPoints(dates, macdLine),    borderColor: '#58a6ff', borderWidth: 1.5, pointRadius: 0, tension: 0.1, fill: false },
        { type: 'line', label: 'シグナル',      data: toPoints(dates, signalLine),  borderColor: '#f0883e', borderWidth: 1.5, pointRadius: 0, tension: 0.1, fill: false },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: { x: SCALE_X, y: SCALE_Y_R },
    },
  });
}

// ============================================================
// Render data
// ============================================================
function renderData(result, quoteResult) {
  const meta = result.meta;
  const timestamps = result.timestamp || [];
  const q = (result.indicators?.quote || [{}])[0];
  const closes  = q.close  || [];
  const opens   = q.open   || [];
  const highs   = q.high   || [];
  const lows    = q.low    || [];
  const volumes = q.volume || [];

  const currency = meta.currency || 'USD';

  // Build valid data array
  const valid = timestamps.map((t, i) => ({
    date: new Date(t * 1000),
    close: closes[i], open: opens[i],
    high: highs[i], low: lows[i], volume: volumes[i],
  })).filter(d => d.close !== null && !isNaN(d.close));

  const dates  = valid.map(d => d.date);
  const vClose = valid.map(d => d.close);
  const vVol   = valid.map(d => d.volume);

  if (vClose.length === 0) throw new Error('価格データが見つかりませんでした');

  const lastClose = vClose[vClose.length - 1];
  const prevClose = meta.previousClose ?? meta.chartPreviousClose ?? vClose[vClose.length - 2] ?? lastClose;
  const change    = lastClose - prevClose;
  const changePct = prevClose ? (change / prevClose) * 100 : 0;
  const isUp = change >= 0;

  // Header
  setEl('stockName', meta.longName || meta.shortName || currentSymbol);
  setEl('stockSymbolInfo', `${meta.symbol || currentSymbol}  ·  ${meta.exchangeName || ''}`);
  document.getElementById('currentPrice').textContent = fmtPrice(lastClose, currency);
  document.getElementById('priceChange').innerHTML =
    `<span class="${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${fmtPrice(change, currency)}  (${isUp ? '+' : ''}${fmtNum(changePct)}%)</span>`;
  setEl('lastUpdated', `最終更新: ${dates[dates.length - 1].toLocaleDateString('ja-JP')}`);

  // Metrics
  const qs = quoteResult?.quoteSummary?.result?.[0] || {};
  const priceInfo   = qs.price        || {};
  const summaryInfo = qs.summaryDetail || {};

  setEl('m-prev', fmtPrice(prevClose, currency));
  setEl('m-open', fmtPrice(meta.regularMarketOpen ?? opens[opens.length - 1], currency));
  setEl('m-high', fmtPrice(meta.regularMarketDayHigh ?? highs[highs.length - 1], currency));
  setEl('m-low',  fmtPrice(meta.regularMarketDayLow  ?? lows[lows.length - 1],   currency));
  setEl('m-52h',  fmtPrice(meta.fiftyTwoWeekHigh     ?? summaryInfo.fiftyTwoWeekHigh?.raw, currency));
  setEl('m-52l',  fmtPrice(meta.fiftyTwoWeekLow      ?? summaryInfo.fiftyTwoWeekLow?.raw,  currency));
  setEl('m-vol',  fmtVol(meta.regularMarketVolume    ?? volumes[volumes.length - 1]));
  setEl('m-cap',  fmtLarge(priceInfo.marketCap?.raw ?? meta.marketCap, currency));
  const per = summaryInfo.trailingPE?.raw ?? priceInfo.trailingPE?.raw;
  setEl('m-per', per ? fmtNum(per) + '倍' : '-');
  const divYield = summaryInfo.dividendYield?.raw;
  setEl('m-div', divYield ? fmtNum(divYield * 100) + '%' : '-');
  setEl('m-cur', currency);

  // Indicators
  const ma25 = calcSMA(vClose, 25);
  const ma75 = calcSMA(vClose, 75);
  const ma200 = calcSMA(vClose, 200);
  const rsi = calcRSI(vClose, 14);
  const { macdLine, signalLine, histogram } = calcMACD(vClose);

  const lastRSI    = rsi[rsi.length - 1];
  const lastMA25   = ma25[ma25.length - 1];
  const lastMA75   = ma75[ma75.length - 1];
  const lastMA200  = ma200[ma200.length - 1];
  const lastMACD   = macdLine[macdLine.length - 1];
  const lastSig    = signalLine[signalLine.length - 1];
  const lastHist   = histogram[histogram.length - 1];
  const prevMA25   = ma25[ma25.length - 2];
  const prevMA75   = ma75[ma75.length - 2];
  const prevMACD   = macdLine[macdLine.length - 2];
  const prevSig    = signalLine[signalLine.length - 2];

  // RSI metric
  setEl('m-rsi', lastRSI !== null ? fmtNum(lastRSI, 1) : '-');
  if (lastRSI !== null) {
    const rsiEl = document.getElementById('m-rsi');
    if (lastRSI >= 70) rsiEl.className = 'metric-value down';
    else if (lastRSI <= 30) rsiEl.className = 'metric-value up';
    else rsiEl.className = 'metric-value neutral-color';
  }

  // Build signals
  const signals = [];

  // Price vs MA
  if (lastMA25 !== null) {
    if (lastClose > lastMA25) signals.push({ name: 'MA25 との位置', label: '上回り (強気)', type: 'buy' });
    else signals.push({ name: 'MA25 との位置', label: '下回り (弱気)', type: 'sell' });
  }
  if (lastMA75 !== null) {
    if (lastClose > lastMA75) signals.push({ name: 'MA75 との位置', label: '上回り (強気)', type: 'buy' });
    else signals.push({ name: 'MA75 との位置', label: '下回り (弱気)', type: 'sell' });
  }

  // MA cross
  if (lastMA25 !== null && lastMA75 !== null && prevMA25 !== null && prevMA75 !== null) {
    if (prevMA25 <= prevMA75 && lastMA25 > lastMA75)
      signals.push({ name: 'MA クロス', label: 'ゴールデンクロス ✨', type: 'buy' });
    else if (prevMA25 >= prevMA75 && lastMA25 < lastMA75)
      signals.push({ name: 'MA クロス', label: 'デッドクロス ⚠️', type: 'sell' });
    else if (lastMA25 > lastMA75)
      signals.push({ name: 'MA 配列', label: '上昇配列', type: 'buy' });
    else
      signals.push({ name: 'MA 配列', label: '下降配列', type: 'sell' });
  }

  // RSI
  if (lastRSI !== null) {
    if (lastRSI >= 70) signals.push({ name: 'RSI(14)', label: `買われすぎ (${fmtNum(lastRSI, 1)})`, type: 'sell' });
    else if (lastRSI <= 30) signals.push({ name: 'RSI(14)', label: `売られすぎ (${fmtNum(lastRSI, 1)})`, type: 'buy' });
    else if (lastRSI >= 50) signals.push({ name: 'RSI(14)', label: `強め (${fmtNum(lastRSI, 1)})`, type: 'buy' });
    else signals.push({ name: 'RSI(14)', label: `弱め (${fmtNum(lastRSI, 1)})`, type: 'sell' });
  }

  // MACD
  if (lastMACD !== null && lastSig !== null) {
    if (prevMACD !== null && prevSig !== null) {
      if (prevMACD <= prevSig && lastMACD > lastSig)
        signals.push({ name: 'MACD', label: 'ゴールデンクロス ✨', type: 'buy' });
      else if (prevMACD >= prevSig && lastMACD < lastSig)
        signals.push({ name: 'MACD', label: 'デッドクロス ⚠️', type: 'sell' });
      else if (lastMACD > lastSig)
        signals.push({ name: 'MACD', label: 'シグナル上 (強気)', type: 'buy' });
      else
        signals.push({ name: 'MACD', label: 'シグナル下 (弱気)', type: 'sell' });
    }
    if (lastHist !== null) {
      signals.push({ name: 'MACDヒスト', label: lastHist >= 0 ? `プラス (${fmtNum(lastHist, 4)})` : `マイナス (${fmtNum(lastHist, 4)})`, type: lastHist >= 0 ? 'buy' : 'sell' });
    }
  }

  // 52-week position
  const h52 = meta.fiftyTwoWeekHigh ?? summaryInfo.fiftyTwoWeekHigh?.raw;
  const l52 = meta.fiftyTwoWeekLow  ?? summaryInfo.fiftyTwoWeekLow?.raw;
  if (h52 && l52 && h52 > l52) {
    const pos = (lastClose - l52) / (h52 - l52) * 100;
    let label, type;
    if (pos >= 80)      { label = `高値圏 (${fmtNum(pos, 0)}%)`; type = 'neutral'; }
    else if (pos <= 20) { label = `安値圏 (${fmtNum(pos, 0)}%)`; type = 'neutral'; }
    else                { label = `中間 (${fmtNum(pos, 0)}%)`; type = 'neutral'; }
    signals.push({ name: '52週レンジ位置', label, type });
  }

  // Render signals
  document.getElementById('analysisContent').innerHTML = signals.map(s => `
    <div class="signal-row">
      <span class="signal-name">${s.name}</span>
      <span class="badge badge-${s.type}">${s.label}</span>
    </div>
  `).join('');

  const buys  = signals.filter(s => s.type === 'buy').length;
  const sells = signals.filter(s => s.type === 'sell').length;
  const overallEl = document.getElementById('overallSignal');
  if (buys > sells) {
    overallEl.className = 'overall-signal overall-buy';
    overallEl.textContent = `🔼 買いシグナル  (${buys}買 / ${sells}売)`;
  } else if (sells > buys) {
    overallEl.className = 'overall-signal overall-sell';
    overallEl.textContent = `🔽 売りシグナル  (${buys}買 / ${sells}売)`;
  } else {
    overallEl.className = 'overall-signal overall-neutral';
    overallEl.textContent = `➡ 中立  (${buys}買 / ${sells}売)`;
  }

  // Show
  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';

  // Draw charts
  drawPriceChart(dates, vClose, ma25, ma75, ma200, currency);
  drawVolumeChart(dates, vVol, vClose, prevClose);
  drawRSIChart(dates, rsi);
  drawMACDChart(dates, macdLine, signalLine, histogram);
}

// ============================================================
// UI helpers
// ============================================================
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.style.display = 'block';
  box.textContent = '⚠️ ' + msg;
  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
}

function showLoading() {
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('mainContent').style.display = 'none';
}

function searchStock() {
  const sym = document.getElementById('symbolInput').value.trim().toUpperCase();
  if (!sym) return;
  currentSymbol = sym;
  loadData();
}

function quickSearch(sym) {
  document.getElementById('symbolInput').value = sym;
  currentSymbol = sym;
  loadData();
}

function changePeriod(btn, range) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRange = range;
  loadData();
}

async function loadData() {
  showLoading();
  destroyCharts();

  try {
    const [chartRes, quoteRes] = await Promise.allSettled([
      fetchYahoo(currentSymbol, currentRange),
      fetchQuoteSummary(currentSymbol),
    ]);

    if (chartRes.status === 'rejected') throw new Error(chartRes.reason?.message || 'データ取得失敗');

    const data = chartRes.value;
    if (data.chart?.error) throw new Error(data.chart.error.description || '銘柄が見つかりません');

    const result = data.chart?.result?.[0];
    if (!result) throw new Error('データが空です。銘柄コードを確認してください (例: AAPL, 7203.T)');

    const quoteData = quoteRes.status === 'fulfilled' ? quoteRes.value : null;
    renderData(result, quoteData);
  } catch (e) {
    showError(e.message + '  ※ 銘柄コード例: AAPL / 7203.T / ^N225 / BTC-USD');
  }
}

// Start
loadData();
</script>
